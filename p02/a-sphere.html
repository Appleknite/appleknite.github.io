<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> 
  </head>
  <body>
	 <script>
     document.addEventListener('DOMContentLoaded', () => {
        const isLocal = ['localhost','127.0.0.1','[::1]'].includes(location.hostname);
        const src = isLocal
          ? 'http://localhost:8000/p02/IMAGES/brick_diffuse.jpg'
          : './IMAGES/brick_diffuse.jpg';

        const img = document.getElementById('bricks');
        img.setAttribute('src', src);        // set it

        // once assets are ready, use it
        document.querySelector('a-assets').addEventListener('loaded', () => {
          document.getElementById('PGB_sphere')
            .setAttribute('material', 'src: #bricks');
        });
      });
      </script>
    <a-assets>
        <img id="bricks" src="#bricks" crossorigin="anonymous">
      </a-assets>
<a-scene>

  <!-- Camera -->
  <a-entity camera position="0 1.6 0"></a-entity>

  <!-- Textured Sphere -->
  <a-sphere  
    id="PGB_sphere" 
    position="0 1.5 -4" 
    radius="1"
    rotation="0 45 0" 
    src="#bricks">
  </a-sphere>

  <!-- Floor -->
  <a-plane 
    position="0 0 -4" 
    rotation="-90 0 0" 
    width="12" 
    height="12" 
    color="#7BC8A4">
  </a-plane>

  <!-- Sky -->
  <a-sky color="#DDEEFF"></a-sky>

</a-scene>
  </body>
</html>
