<html>
  <head>
    <script src="../js/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <!-- Camera with WASD controls -->
      <a-entity camera wasd-controls position="0 1.6 0"></a-entity>

      <!-- Box -->
      <a-entity 
        geometry="primitive: box; height:2; width:1; depth:1"
        material="color: red"
        position="0 1 -5"
        rotation="0 45 0">
      </a-entity>

      <!-- Floor -->
      <a-plane 
        position="0 0 -4"
        rotation="-90 0 0"
        width="10"
        height="10"
        color="gray">
      </a-plane>

    </a-scene>

  </body>
</html>
