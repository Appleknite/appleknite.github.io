<!DOCTYPE html>
<html>
  <head>
    <script src="../js/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <!-- Camera -->
      <a-entity camera wasd-controls position="0 1.6 0"></a-entity>

      <!-- Rotating Box -->
      <a-entity 
        geometry="primitive: box" 
        material="color: blue" 
        position="0 1.5 -5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-entity>

      <!-- Floor -->
      <a-plane 
        position="0 0 -4" 
        rotation="-90 0 0" 
        width="10" 
        height="10" 
        color="#CCCCCC">
      </a-plane>

      <!-- Sky -->
      <a-sky color="#EEF7FF"></a-sky>

    </a-scene>

  </body>
</html>
